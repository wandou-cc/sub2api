# Local repository development runtime.
# Uses the existing deploy_sub2api-network, PostgreSQL, Redis, and deploy/data.

services:
  sub2api-dev:
    image: golang:1.26.4-alpine
    container_name: sub2api-dev
    restart: unless-stopped
    working_dir: /workspace/backend
    ports:
      - "${DEV_BACKEND_BIND_HOST:-127.0.0.1}:${DEV_BACKEND_PORT:-8081}:8080"
    volumes:
      - ..:/workspace
      - ./data:/app/data
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
      - air_bin:/go/bin
    environment:
      - DATA_DIR=/app/data
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - SERVER_MODE=debug
      - TZ=${TZ:-Asia/Shanghai}
      - CGO_ENABLED=0
    command: >
      sh -c '
        apk add --no-cache git ca-certificates &&
        if ! command -v air >/dev/null 2>&1; then
          go install github.com/air-verse/air@latest;
        fi &&
        air -c /workspace/deploy/air.backend.toml
      '
    networks:
      - sub2api-network

  sub2api-frontend-dev:
    image: node:24-alpine
    container_name: sub2api-frontend-dev
    restart: unless-stopped
    working_dir: /workspace/frontend
    ports:
      - "${DEV_FRONTEND_BIND_HOST:-127.0.0.1}:${DEV_FRONTEND_PORT:-3000}:3000"
    volumes:
      - ..:/workspace
      - frontend_node_modules:/workspace/frontend/node_modules
      - pnpm_store:/pnpm/store
    environment:
      - VITE_DEV_PROXY_TARGET=http://sub2api-dev:8080
      - VITE_DEV_PORT=3000
      - CHOKIDAR_USEPOLLING=true
    command: >
      sh -c '
        corepack enable &&
        corepack prepare pnpm@9 --activate &&
        pnpm install --no-frozen-lockfile --lockfile=false --store-dir /pnpm/store &&
        pnpm run dev -- --host 0.0.0.0
      '
    depends_on:
      - sub2api-dev
    networks:
      - sub2api-network

networks:
  sub2api-network:
    external: true
    name: deploy_sub2api-network

volumes:
  air_bin:
  go_mod_cache:
  go_build_cache:
  frontend_node_modules:
  pnpm_store:
